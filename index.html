<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>儿童节快乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            /* 使用svh(短视口高度)或lvh，防止手机浏览器工具栏遮挡内容 */
            height: 100vh;
            height: 100svh; 
            overflow: hidden;
            background-color: #111116;
            font-family: 'Microsoft YaHei', -apple-system, sans-serif;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>
    <canvas id="particleCanvas"></canvas>
    <script>
        // 获取屏幕像素比，解决手机高DPI模糊/文字过大问题
        const dpr = window.devicePixelRatio || 1;

        // ==================== 1. 背景 LOVE 竖往下落 ====================
        const matrixCanvas = document.getElementById('matrixCanvas');
        const mCtx = matrixCanvas.getContext('2d');

        const isMobile = window.innerWidth < 768;
        const fontSize = isMobile ? 18 : 36; // 稍微调小手机端的背景字号          
        const columnSpacing = 12;     
        const columnWidth = fontSize + columnSpacing; 
        let columns;
        let drops = [];

        let matrixSpeed = 0.23;       
        let trailOpacity = 0.05;      
        const word = "LOVE".split(""); 

        function resizeMatrix() {
            // 考虑DPI放大画布物理像素
            matrixCanvas.width = window.innerWidth * dpr;
            matrixCanvas.height = window.innerHeight * dpr;
            
            // 缩放画布上下文以适应逻辑像素
            mCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

            columns = Math.floor(window.innerWidth / columnWidth);
            drops = [];
            for (let i = 0; i < columns; i++) {
                drops[i] = Math.random() * (-window.innerHeight / fontSize) * 1.5;
            }
        }
        resizeMatrix();

        function drawMatrix() {
            mCtx.fillStyle = `rgba(17, 17, 22, ${trailOpacity})`;
            mCtx.fillRect(0, 0, window.innerWidth, window.innerHeight);

            mCtx.fillStyle = "rgba(255, 105, 180, 0.35)";
            mCtx.font = `bold ${fontSize}px monospace`;

            for (let i = 0; i < drops.length; i++) {
                const currentLine = Math.floor(drops[i]);
                if (currentLine >= 0) {
                    const charIndex = currentLine % word.length;
                    const text = word[charIndex];
                    mCtx.fillText(text, i * columnWidth, currentLine * fontSize);
                }

                if (drops[i] * fontSize > window.innerHeight && Math.random() > 0.975) {
                    drops[i] = -word.length; 
                }
                drops[i] += matrixSpeed;
            }
        }

        // ==================== 2. 粒子文字特效 ====================
        const particleCanvas = document.getElementById('particleCanvas');
        const pCtx = particleCanvas.getContext('2d');

        function resizeParticle() {
            // 同理处理粒子画布的高清屏缩放
            particleCanvas.width = window.innerWidth * dpr;
            particleCanvas.height = window.innerHeight * dpr;
            pCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        resizeParticle();

        let particles = [];
        const textSequence = ["3", "2", "1", "祝", "许萌", "六一快乐", "愿你永远天真烂漫，也永远有人偏爱"];
        let sequenceIndex = 0;

        class Particle {
            constructor(x, y) {
                // 初始随机位置在逻辑像素范围内
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                this.targetX = x;
                this.targetY = y;
                this.radius = Math.random() * 1.0 + 1.5; // 配合高清屏微调粒子大小
                this.speed = 0.05 + Math.random() * 0.04; 
            }
            update() {
                this.x += (this.targetX - this.x) * this.speed;
                this.y += (this.targetY - this.y) * this.speed;
            }
            draw() {
                pCtx.beginPath();
                // 绘制在逻辑坐标系上
                pCtx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                pCtx.fillStyle = "rgba(255, 255, 255, 0.88)"; 
                pCtx.shadowBlur = 8; 
                pCtx.shadowColor = "#ffffff";
                pCtx.fill();
                pCtx.shadowBlur = 0;
            }
        }

        function getTextPoints(text) {
            const points = [];
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
           
            // 采样画布无需DPI缩放，直接用标准逻辑分辨率
            tempCanvas.width = window.innerWidth;
            tempCanvas.height = window.innerHeight;

            let lines = [];
            if (text === "愿你永远天真烂漫，也永远有人偏爱") {
                if (window.innerWidth < 600) { 
                    // 手机端长句拆成 4 行，防止超出屏幕
                    lines = ["愿你永远", "天真烂漫", "也永远有", "人偏爱❤"];
                } else {
                    lines = ["愿你永远天真烂漫", "也永远有人偏爱❤"];
                }
            } else {
                lines.push(text);
            }

            const maxLength = Math.max(...lines.map(l => l.length));
            // 调小手机端的最大字号限制（从52调到36，确保带上安全边距后不会出界）
            const maxAllowedSize = window.innerWidth < 600 ? 36 : 110;
            let size = Math.min(tempCanvas.width / (maxLength + 1.5), maxAllowedSize);
            
            if (text.length === 1 && window.innerWidth < 600) {
                size = 100;
            }
            
            tempCtx.font = `bold ${size}px 'Microsoft YaHei', -apple-system, sans-serif`;
            tempCtx.fillStyle = '#ffffff';
            tempCtx.textAlign = 'center';
            tempCtx.textBaseline = 'middle';
           
            const lineHeight = size * 1.4; 
            const totalHeight = lineHeight * lines.length;
            const startY = (tempCanvas.height - totalHeight) / 2 + lineHeight / 2;

            lines.forEach((lineText, index) => {
                const currentY = startY + index * lineHeight;
                tempCtx.fillText(lineText, tempCanvas.width / 2, currentY);
            });
           
            const imgData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height).data;
            
            // 采样步长使用整数更安全
            const step = 5; 
            
            for (let y = 0; y < tempCanvas.height; y += step) {
                for (let x = 0; x < tempCanvas.width; x += step) {
                    // 严格取整计算数组索引
                    const posX = Math.floor(x);
                    const posY = Math.floor(y);
                    const index = (posY * tempCanvas.width + posX) * 4;
                    if (imgData[index + 3] > 128) {
                        points.push({ x: posX, y: posY });
                    }
                }
            }
            return points;
        }

        function createTextTransition(text) {
            const points = getTextPoints(text);
           
            if (particles.length < points.length) {
                for (let i = particles.length; i < points.length; i++) {
                    particles.push(new Particle(window.innerWidth / 2, window.innerHeight / 2));
                }
            }
           
            for (let i = 0; i < particles.length; i++) {
                if (i < points.length) {
                    particles[i].targetX = points[i].x;
                    particles[i].targetY = points[i].y;
                } else {
                    particles[i].targetX = Math.random() * window.innerWidth;
                    particles[i].targetY = -50; 
                }
            }
        }

        // 初始化
        createTextTransition(textSequence[sequenceIndex]);

        let textTimer = setInterval(switchText, 2500);

        function switchText() {
            sequenceIndex = (sequenceIndex + 1) % textSequence.length;
            
            clearInterval(textTimer);
            const nextTime = textSequence[sequenceIndex].length > 6 ? 4500 : 2500;
            textTimer = setInterval(switchText, nextTime);

            createTextTransition(textSequence[sequenceIndex]);
        }

        // ==================== 3. 动画主循环 ====================
        function animate() {
            drawMatrix();
            pCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            
            requestAnimationFrame(animate);
        }
        animate();

        // 窗口调整
        window.addEventListener('resize', () => {
            resizeMatrix();
            resizeParticle();
            createTextTransition(textSequence[sequenceIndex]);
        });
    </script>
</body>
</html>
