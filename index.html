<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>儿童节快乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100vh;
            height: 100svh; 
            overflow: hidden;
            background-color: #0c0c0f; 
            font-family: 'Microsoft YaHei', -apple-system, sans-serif;
            cursor: pointer;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0; /* 默认隐藏：音乐响起前保持静谧，响起时配合特效爆发 */
            transition: opacity 1.5s ease;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" autoplay></audio>

    <canvas id="matrixCanvas"></canvas>
    <canvas id="particleCanvas"></canvas>

    <script>
        const dpr = window.devicePixelRatio || 1;

        // ==================== 1. 【高能重构】多歌曲列表循环 & 强力全自动播放 ====================
        
        // 已经帮你精准配置好 music 文件夹路径与完整文件名
        const playlist = [
            "music/唐宁_-_我和你.ogg",
            "music/邵丽棠_-_快乐的扑满.flac"
        ];
        let currentTrackIndex = 0;

        const audio = document.getElementById('bgMusic');
        let hasInitializedAnimation = false; // 是否已经触发动画亮起

        // 初始化播放首支歌曲
        audio.src = playlist[currentTrackIndex];

        // 核心：当第一首播完，自动切换到下一首，实现列表无限循环
        audio.addEventListener('ended', function() {
            currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
            audio.src = playlist[currentTrackIndex];
            audio.play().catch(err => console.log("切歌自动播放被拦截，等待点击:", err));
        });

        // 激活特效并让画面淡入显现
        function startVisuals() {
            if (!hasInitializedAnimation) {
                hasInitializedAnimation = true;
                // 让背景雨和粒子 Canvas 优雅淡入显现
                document.getElementById('matrixCanvas').style.opacity = '1';
                document.getElementById('particleCanvas').style.opacity = '1';
                // 启动动画主循环
                animate();
            }
        }

        // 硬核播放函数
        function forcePlayMusic() {
            if (audio) {
                audio.play().then(() => {
                    console.log("音乐全自动启动成功！");
                    startVisuals();
                    removePlayListeners();
                }).catch(err => {
                    console.log("常规浏览器拦截了首帧无交互音频，正在等待用户首次触屏或移动鼠标...");
                });
            }
        }

        function removePlayListeners() {
            window.removeEventListener('click', forcePlayMusic);
            window.removeEventListener('touchstart', forcePlayMusic);
            window.removeEventListener('mousemove', forcePlayMusic);
        }

        // [策略1] 页面结构加载完，立刻硬核冲锋尝试播放
        window.addEventListener('DOMContentLoaded', forcePlayMusic);

        // [策略2] 针对微信端的全自动绿色通道，直接突破限制一打开就播
        document.addEventListener("WeixinJSBridgeReady", function () {
            forcePlayMusic();
        }, false);

        // [策略3] 针对普通浏览器（Safari/Chrome）的无感知拦截解锁（点按、划动、鼠标一晃瞬间激活）
        window.addEventListener('click', forcePlayMusic);
        window.addEventListener('touchstart', forcePlayMusic);
        window.addEventListener('mousemove', forcePlayMusic); 


        // ==================== 2. 背景 LOVE 矩阵数字雨 ====================
        const matrixCanvas = document.getElementById('matrixCanvas');
        const mCtx = matrixCanvas.getContext('2d');

        let isMobile = window.innerWidth < 768;
        let fontSize = isMobile ? 12 : 20;          
        let columns;
        let drops = [];
        let columnProps = []; 

        const word = "LOVE".split(""); 

        function resizeMatrix() {
            matrixCanvas.width = window.innerWidth * dpr;
            matrixCanvas.height = window.innerHeight * dpr;
            mCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

            const columnWidth = fontSize + 4; 
            columns = Math.floor(window.innerWidth / columnWidth);
            
            drops = [];
            columnProps = [];
            
            for (let i = 0; i < columns; i++) {
                drops[i] = Math.random() * (-window.innerHeight / fontSize) * 4.0;
                columnProps[i] = {
                    speed: 0.15 + Math.random() * 0.25,
                    opacity: 0.08 + Math.random() * 0.22 
                };
            }
        }
        resizeMatrix();

        function drawMatrix() {
            mCtx.fillStyle = "rgba(12, 12, 15, 0.09)";
            mCtx.fillRect(0, 0, window.innerWidth, window.innerHeight);

            mCtx.font = `bold ${fontSize}px monospace`;

            for (let i = 0; i < columns; i++) {
                const currentLine = Math.floor(drops[i]);
                if (currentLine >= 0) {
                    const charIndex = currentLine % word.length;
                    const text = word[charIndex];
                    
                    mCtx.fillStyle = `rgba(255, 105, 180, ${columnProps[i].opacity})`;
                    mCtx.fillText(text, i * (fontSize + 4), currentLine * fontSize);
                }

                if (drops[i] * fontSize > window.innerHeight && Math.random() > 0.988) {
                    drops[i] = -word.length; 
                    columnProps[i].speed = 0.15 + Math.random() * 0.25;
                    columnProps[i].opacity = 0.08 + Math.random() * 0.22;
                }
                drops[i] += columnProps[i].speed;
            }
        }

        // ==================== 3. 粒子文字特效 ====================
        const particleCanvas = document.getElementById('particleCanvas');
        const pCtx = particleCanvas.getContext('2d');

        function resizeParticle() {
            particleCanvas.width = window.innerWidth * dpr;
            particleCanvas.height = window.innerHeight * dpr;
            pCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        resizeParticle();

        let particles = [];
        const textSequence = ["3", "2", "1", "祝", "许萌", "六一快乐", "愿你永远天真烂漫，也永远有人偏爱"];
        let sequenceIndex = 0;

        class Particle {
            constructor(x, y, isExtra = false) {
                this.x = isExtra ? x : Math.random() * window.innerWidth;
                this.y = isExtra ? y : Math.random() * window.innerHeight;
                this.targetX = x;
                this.targetY = y;
                
                const baseRadius = window.innerWidth < 600 ? 1.4 : 1.2;
                this.radius = Math.random() * 0.6 + baseRadius; 
                
                this.speed = 0.06 + Math.random() * 0.04; 
                this.alpha = 1;
                this.isDying = false; 
            }
            update() {
                this.x += (this.targetX - this.x) * this.speed;
                this.y += (this.targetY - this.y) * this.speed;
                if (this.isDying) {
                    this.alpha -= 0.05; 
                }
            }
            draw() {
                if (this.alpha <= 0) return;
                pCtx.save();
                pCtx.globalAlpha = this.alpha;
                pCtx.beginPath();
                pCtx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                pCtx.fillStyle = "rgba(255, 255, 255, 0.95)"; 
                
                pCtx.shadowBlur = window.innerWidth < 600 ? 4 : 6; 
                pCtx.shadowColor = "#ffffff";
                pCtx.fill();
                pCtx.restore();
            }
        }

        function getTextPoints(text) {
            const points = [];
            const memCanvas = document.createElement('canvas');
            const memCtx = memCanvas.getContext('2d');
           
            memCanvas.width = window.innerWidth * dpr;
            memCanvas.height = window.innerHeight * dpr;
            memCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

            let lines = [];
            if (text === "愿你永远天真烂漫，也永远有人偏爱") {
                if (window.innerWidth < 600) { 
                    lines = ["愿你永远", "天真烂漫", "也永远有", "人偏爱❤"];
                } else {
                    lines = ["愿你永远天真烂漫", "也永远有人偏爱❤"];
                }
            } else {
                lines.push(text);
            }

            const maxLength = Math.max(...lines.map(l => l.length));
            const maxAllowedSize = window.innerWidth < 600 ? 32 : 85;
            let size = Math.min((window.innerWidth - 40) / maxLength, maxAllowedSize);
            
            if (text.length === 1 && window.innerWidth < 600) {
                size = 75; 
            }
            
            memCtx.font = `bold ${size}px 'Microsoft YaHei', -apple-system, sans-serif`;
            memCtx.fillStyle = '#ffffff';
            memCtx.textAlign = 'center';
            memCtx.textBaseline = 'middle';
           
            const lineHeight = size * 1.4; 
            const totalHeight = lineHeight * lines.length;
            const startY = (window.innerHeight - totalHeight) / 2 + lineHeight / 2;

            lines.forEach((lineText, index) => {
                const currentY = startY + index * lineHeight;
                memCtx.fillText(lineText, window.innerWidth / 2, currentY);
            });
           
            const imgData = memCtx.getImageData(0, 0, memCanvas.width, memCanvas.height).data;
            const step = window.innerWidth < 600 ? 3 : 4; 
            
            for (let y = 0; y < memCanvas.height; y += step) {
                for (let x = 0; x < memCanvas.width; x += step) {
                    const posX = Math.floor(x);
                    const posY = Math.floor(y);
                    const index = (posY * memCanvas.width + posX) * 4;
                    
                    if (imgData[index + 3] > 50) {
                        points.push({ x: posX / dpr, y: posY / dpr });
                    }
                }
            }
            
            memCanvas.width = 0;
            memCanvas.height = 0;
            return points;
        }

        function createTextTransition(text) {
            const points = getTextPoints(text);
            particles = particles.filter(p => !p.isDying || p.alpha > 0);

            if (particles.length < points.length) {
                const currentLen = particles.length;
                for (let i = 0; i < points.length; i++) {
                    if (i < currentLen) {
                        particles[i].targetX = points[i].x;
                        particles[i].targetY = points[i].y;
                    } else {
                        particles.push(new Particle(points[i].x, points[i].y));
                    }
                }
            } else {
                for (let i = 0; i < particles.length; i++) {
                    if (i < points.length) {
                        particles[i].targetX = points[i].x;
                        particles[i].targetY = points[i].y;
                        particles[i].isDying = false;
                        particles[i].alpha = 1;
                    } else {
                        particles[i].isDying = true;
                    }
                }
            }
        }

        createTextTransition(textSequence[sequenceIndex]);

        let textTimer = setInterval(switchText, 2500);

        function switchText() {
            sequenceIndex = (sequenceIndex + 1) % textSequence.length;
            
            clearInterval(textTimer);
            const nextTime = textSequence[sequenceIndex].length > 6 ? 4500 : 2500;
            textTimer = setInterval(switchText, nextTime);

            createTextTransition(textSequence[sequenceIndex]);
        }

        // ==================== 4. 动画主循环 ====================
        function animate() {
            drawMatrix(); 
            pCtx.clearRect(0, 0, window.innerWidth, window.innerHeight); 
            
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            
            requestAnimationFrame(animate);
        }

        // 窗口尺寸变更平滑自适应
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                isMobile = window.innerWidth < 768;
                fontSize = isMobile ? 12 : 20;

                resizeMatrix();
                resizeParticle();
                createTextTransition(textSequence[sequenceIndex]);
            }, 100);
        });
    </script>
</body>
</html>
